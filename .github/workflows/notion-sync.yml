name: Sync Markdown to Notion

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          npx @vrerv/md-to-notion \
            -t "${{ secrets.NOTION_API_KEY }}" \
            -p "${{ secrets.NOTION_PARENT_PAGE_ID }}" \
            .
